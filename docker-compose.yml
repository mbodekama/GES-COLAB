version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: ges_colab_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - maildev

  nginx:
    image: nginx:latest
    container_name: ges_colab_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ges_colab_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gescolab
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3306:3306"

  maildev:
    image: maildev/maildev:latest
    container_name: ges_colab_maildev
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "1080:1080"   # UI web